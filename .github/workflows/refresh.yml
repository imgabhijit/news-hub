name: Refresh Videos

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated JSON files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-api-python-client python-dotenv

      - name: Run fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos.json data/channels_meta.json data/video_id_cache.json
          git add data/opinion_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: refresh videos [skip ci]"
          git pull --rebase origin main
          git push
